<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Price Alerts</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>Flight Price Alerts</h2>
            <div id="themeToggle" class="toggle">Dark Mode</div>
        </header>

        <div class="card">
            <div class="grid">
                <div class="route-container">
                    <div class="autocomplete">
                        <label>Origin</label>
                        <input id="origin" placeholder="Where from?">
                        <div id="origin-list" class="suggestions"></div>
                    </div>
                    
                    <button type="button" id="swapBtn" title="Swap Locations">⇄</button>

                    <div class="autocomplete">
                        <label>Destination</label>
                        <input id="destination" placeholder="Where to?">
                        <div id="destination-list" class="suggestions"></div>
                    </div>
                </div>

                <div class="field-group">
                    <label>Trip Type</label>
                    <div class="select-wrapper">
                        <select id="tripType">
                            <option value="round">Round Trip</option>
                            <option value="oneway">One Way</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label>Max Price</label>
                    <input type="number" id="price" placeholder="0.00">
                </div>

                <div class="field-group">
                    <label>Departure Date</label>
                    <input type="date" id="departure">
                </div>

                <div id="returnContainer" class="field-group">
                    <label>Return Date</label>
                    <input type="date" id="returnDate">
                </div>
            </div>

            <div class="email-section">
                <label>Email Address</label>
                <input id="email" type="email" placeholder="example@email.com">
            </div>

            <button id="createAlertBtn" class="main-btn">Create Alert</button>
        </div>

        <div class="history">
            <h3 class="history-header">
                <span>Alert History</span>
                <button id="clearHistoryBtn" class="clear-btn">Clear All</button>
            </h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script src="airports.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
