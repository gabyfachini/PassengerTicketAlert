<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Price Alerts</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h2>Flight Price Alerts</h2>
                <p>Track your dream destinations</p>
            </div>
            <button id="themeToggle" class="toggle-btn">Dark Mode</button>
        </header>

        <div class="card" id="inputCard">
            <div class="grid">
                <div class="route-container">
                    <div class="autocomplete">
                        <label for="origin">Origin</label>
                        <input id="origin" placeholder="City or Airport" autocomplete="off">
                        <div id="origin-list" class="suggestions"></div>
                    </div>
                    
                    <button type="button" id="swapBtn" title="Swap Locations">⇄</button>

                    <div class="autocomplete">
                        <label for="destination">Destination</label>
                        <input id="destination" placeholder="City or Airport" autocomplete="off">
                        <div id="destination-list" class="suggestions"></div>
                    </div>
                </div>

                <div class="field-group">
                    <label>Trip Type</label>
                    <div class="select-wrapper">
                        <select id="tripType">
                            <option value="round">Round Trip</option>
                            <option value="oneway">One Way</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label>Max Price</label>
                    <div class="price-input-container">
                        <select id="currency">
                            <option value="USD">$ USD</option>
                            <option value="BRL">R$ BRL</option>
                            <option value="EUR">€ EUR</option>
                            <option value="GBP">£ GBP</option>
                        </select>
                        <input type="number" id="price" placeholder="0.00" min="0">
                    </div>
                </div>

                <div class="field-group">
                    <label>Departure Date</label>
                    <input type="date" id="departure">
                </div>

                <div id="returnContainer" class="field-group">
                    <label>Return Date</label>
                    <input type="date" id="returnDate">
                </div>
            </div>

            <div class="email-section">
                <label>Email Address</label>
                <input id="email" type="email" placeholder="example@email.com">
            </div>

            <button id="createAlertBtn" class="main-btn">Create Alert</button>
        </div>

        <div class="history">
            <div class="history-header">
                <h3>Active Alerts</h3>
                <button id="clearHistoryBtn" class="clear-btn">Clear All</button>
            </div>
            <div id="historyList" class="history-grid">
                </div>
        </div>
    </div>

    <script src="airports.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
